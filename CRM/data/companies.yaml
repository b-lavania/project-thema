# Ops-AI lane — seed list for Series-A/B logistics / field-service / supply-chain companies.
# Segment: dream | realistic | consulting (consulting = reach / stretch only)
# Re-seed: delete CRM tempus.db once after major YAML edits, or add new names only (dedupes by name).

# --- Freight / trucking / brokerage AI (dream) ---
- name: Greenscreens.ai
  url: https://www.greenscreens.ai
  industry: freight pricing / AI
  segment: dream
  hypothesis: Brokers price on gut feel; real bottleneck is lane-level margin decision latency, not missing dashboards.
  notes: Dynamic freight pricing. Series-A target.

- name: Optimal Dynamics
  url: https://www.optimaldynamics.com
  industry: trucking OR / decisions
  segment: dream
  hypothesis: Network optimization decks don't move until dispatchers trust daily recommendations over tribal knowledge.
  notes: OR/decision automation for trucking.

- name: Parade
  url: https://www.parade.co
  industry: capacity / carrier matching
  segment: dream
  hypothesis: Digitizing carrier relationships fails when onboarding friction exceeds phone-call habit.
  notes: Capacity management for brokers.

- name: BuildOps
  url: https://www.buildops.com
  industry: commercial field service
  segment: dream
  hypothesis: Dispatch + invoicing fragmentation; AI must compress quote-to-schedule, not add chatbots.
  notes: Commercial contractor field service platform.


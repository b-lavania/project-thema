name: Daily Article Fetch

on:
  schedule:
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch best article and send notification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python agent/fetch_articles.py

      - name: Commit updated state.json
        run: |
          git config user.name "post-agent[bot]"
          git config user.email "post-agent@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update article state [skip ci]"
          git push
